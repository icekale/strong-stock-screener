name: Sync a-stock-data

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-a-stock-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Run synchronization tests
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -p 'test_*a_stock_data*.py' -v

      - name: Synchronize and open review PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          python scripts/sync_a_stock_data.py --destination "third_party/a-stock-data" --summary-path "${RUNNER_TEMP}/a-stock-data-sync-summary.md"
          cat "${RUNNER_TEMP}/a-stock-data-sync-summary.md" >> "${GITHUB_STEP_SUMMARY}"

          if git diff --quiet -- "third_party/a-stock-data"; then
            echo "The a-stock-data snapshot is already current."
            exit 0
          fi

          branch="automation/a-stock-data-sync"
          remote_exists=false
          remote_sha=""
          remote_ref="refs/remotes/origin/${branch}"
          proposal_changed=true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "refs/heads/${branch}" > /dev/null; then
            git fetch --no-tags origin "refs/heads/${branch}:refs/remotes/origin/${branch}"
            remote_sha="$(git rev-parse "${remote_ref}")"
            remote_exists=true

            remote_metadata_path="${RUNNER_TEMP}/a-stock-data-remote-metadata.json"
            if git show "${remote_ref}:third_party/a-stock-data/metadata.json" > "${remote_metadata_path}" && \
              python - "${remote_metadata_path}" <<'PY'
          import json
          import sys
          from pathlib import Path


          def proposal_identity(metadata):
              upstream = metadata["upstream"]
              return {
                  "upstream": {
                      "commit": upstream["commit"],
                      "version": upstream["version"],
                  },
                  "artifacts": metadata["artifacts"],
              }


          local_metadata = json.loads(
              Path("third_party/a-stock-data/metadata.json").read_text(
                  encoding="utf-8"
              )
          )
          remote_metadata = json.loads(
              Path(sys.argv[1]).read_text(encoding="utf-8")
          )
          if proposal_identity(local_metadata) != proposal_identity(remote_metadata):
              raise SystemExit(1)
          PY
            then
              proposal_changed=false
              echo "The remote synchronization branch already proposes this upstream content."
            fi
          else
            ls_remote_status="$?"
            if [[ "${ls_remote_status}" -ne 2 ]]; then
              echo "Failed to inspect the remote synchronization branch." >&2
              exit "${ls_remote_status}"
            fi
          fi

          read -r upstream_version upstream_short_sha < <(
            python - <<'PY'
          import json
          from pathlib import Path

          metadata = json.loads(
              Path("third_party/a-stock-data/metadata.json").read_text(encoding="utf-8")
          )
          upstream = metadata["upstream"]
          print(upstream["version"], upstream["commit"][:7])
          PY
          )

          if [[ "${proposal_changed}" == true ]]; then
            git switch -C "${branch}" main
            git add -- "third_party/a-stock-data"
            git commit --only -m "chore: sync a-stock-data ${upstream_version} (${upstream_short_sha})" -- "third_party/a-stock-data"

            if [[ "${remote_exists}" == true ]]; then
              git push --force-with-lease="refs/heads/${branch}:${remote_sha}" origin "HEAD:refs/heads/${branch}"
            else
              git push origin "HEAD:refs/heads/${branch}"
            fi
          fi

          repository_owner="${GITHUB_REPOSITORY%%/*}"
          if ! PR_JSON="$(gh pr list --state open --head "${branch}" --base main --limit 100 --json number,headRefName,isCrossRepository,headRepositoryOwner)"; then
            echo "Failed to list open synchronization PRs." >&2
            exit 1
          fi
          if ! PR_NUMBERS="$(
            PR_JSON="${PR_JSON}" python - "${branch}" "${repository_owner}" <<'PY'
          import json
          import os
          import sys


          branch, repository_owner = sys.argv[1:]
          for pr in json.loads(os.environ["PR_JSON"]):
              owner = pr["headRepositoryOwner"]
              owner_login = owner.get("login") if isinstance(owner, dict) else owner
              if (
                  pr["headRefName"] == branch
                  and pr["isCrossRepository"] is False
                  and owner_login == repository_owner
              ):
                  print(pr["number"])
          PY
          )"; then
            echo "Failed to parse open synchronization PRs." >&2
            exit 1
          fi
          pr_numbers=()
          if [[ -n "${PR_NUMBERS}" ]]; then
            while IFS= read -r pr_number; do
              pr_numbers+=("${pr_number}")
            done <<< "${PR_NUMBERS}"
          fi
          if (( ${#pr_numbers[@]} > 1 )); then
            echo "More than one open synchronization PR exists." >&2
            exit 1
          fi

          if (( ${#pr_numbers[@]} == 0 )); then
            gh pr create \
              --base main \
              --head "${branch}" \
              --title "chore: review a-stock-data ${upstream_version}" \
              --body-file "${RUNNER_TEMP}/a-stock-data-sync-summary.md"
          elif (( ${#pr_numbers[@]} == 1 )) && [[ "${proposal_changed}" == true ]]; then
            gh pr edit "${pr_numbers[0]}" \
              --base main \
              --title "chore: review a-stock-data ${upstream_version}" \
              --body-file "${RUNNER_TEMP}/a-stock-data-sync-summary.md"
          else
            echo "The existing synchronization PR already proposes this upstream content."
          fi
