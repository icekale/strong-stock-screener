name: Sync a-stock-data

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-a-stock-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Run synchronization tests
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -p 'test_*a_stock_data*.py' -v

      - name: Synchronize and open review PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          python scripts/sync_a_stock_data.py --destination "third_party/a-stock-data" --summary-path "${RUNNER_TEMP}/a-stock-data-sync-summary.md"
          cat "${RUNNER_TEMP}/a-stock-data-sync-summary.md" >> "${GITHUB_STEP_SUMMARY}"

          if git diff --quiet -- "third_party/a-stock-data"; then
            echo "The a-stock-data snapshot is already current."
            exit 0
          fi

          branch="automation/a-stock-data-sync"
          remote_exists=false
          remote_sha=""
          remote_ref="refs/remotes/origin/${branch}"
          proposal_changed=true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "refs/heads/${branch}" > /dev/null; then
            git fetch --no-tags origin "refs/heads/${branch}:refs/remotes/origin/${branch}"
            remote_sha="$(git rev-parse "${remote_ref}")"
            remote_exists=true

            merge_base="$(git merge-base main "${remote_ref}")"
            if git diff --quiet "${merge_base}" "${remote_ref}" -- . ":(exclude)third_party/a-stock-data"; then
              expected_remote_modes=$'100644\n100644\n100644\n100644'
              remote_modes="$(
                git ls-tree -r "${remote_ref}" -- "third_party/a-stock-data" | \
                  awk '{print $1}'
              )"
              if [[ "${remote_modes}" == "${expected_remote_modes}" ]]; then
                remote_snapshot_root="$(mktemp -d "${RUNNER_TEMP}/a-stock-data-remote.XXXXXX")"
                if git archive "${remote_ref}" -- "third_party/a-stock-data" | tar -x -C "${remote_snapshot_root}" && \
                  python scripts/sync_a_stock_data.py --check --destination "${remote_snapshot_root}/third_party/a-stock-data" && \
                  python - "third_party/a-stock-data" "${remote_snapshot_root}/third_party/a-stock-data" <<'PY'
          import json
          import sys
          from pathlib import Path


          def proposal_identity(root):
              metadata = json.loads(
                  (root / "metadata.json").read_text(encoding="utf-8")
              )
              metadata["upstream"].pop("synced_at")
              content = {
                  path.name: path.read_bytes()
                  for path in sorted(root.iterdir())
                  if path.name != "metadata.json"
              }
              return metadata, content


          local_root, remote_root = map(Path, sys.argv[1:])
          if proposal_identity(local_root) != proposal_identity(remote_root):
              raise SystemExit(1)
          PY
                then
                  proposal_changed=false
                  echo "The remote synchronization branch already proposes this upstream content."
                fi
                rm -rf -- "${remote_snapshot_root}"
              fi
            fi
          else
            ls_remote_status="$?"
            if [[ "${ls_remote_status}" -ne 2 ]]; then
              echo "Failed to inspect the remote synchronization branch." >&2
              exit "${ls_remote_status}"
            fi
          fi

          read -r upstream_version upstream_short_sha < <(
            python - <<'PY'
          import json
          from pathlib import Path

          metadata = json.loads(
              Path("third_party/a-stock-data/metadata.json").read_text(encoding="utf-8")
          )
          upstream = metadata["upstream"]
          print(upstream["version"], upstream["commit"][:7])
          PY
          )

          if [[ "${proposal_changed}" == true ]]; then
            git switch -C "${branch}" main
            git add -- "third_party/a-stock-data"
            git commit --only -m "chore: sync a-stock-data ${upstream_version} (${upstream_short_sha})" -- "third_party/a-stock-data"

            if [[ "${remote_exists}" == true ]]; then
              git push --force-with-lease="refs/heads/${branch}:${remote_sha}" origin "HEAD:refs/heads/${branch}"
            else
              git push origin "HEAD:refs/heads/${branch}"
            fi
          else
            git push --force-with-lease="refs/heads/${branch}:${remote_sha}" origin "${remote_sha}:refs/heads/${branch}"
          fi

          desired_title="chore: review a-stock-data ${upstream_version}"
          if ! PR_JSON="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls" -f "head=${GITHUB_REPOSITORY_OWNER}:${branch}" -f "state=open")"; then
            echo "Failed to list open synchronization PRs." >&2
            exit 1
          fi
          if ! PR_DECISION="$(
            PR_JSON="${PR_JSON}" python - "${desired_title}" "${RUNNER_TEMP}/a-stock-data-sync-summary.md" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path


          desired_title = sys.argv[1]
          desired_body = Path(sys.argv[2]).read_text(encoding="utf-8")
          pull_requests = json.loads(os.environ["PR_JSON"])
          if len(pull_requests) > 1:
              print("multiple")
          elif not pull_requests:
              print("create")
          else:
              pr = pull_requests[0]
              is_current = (
                  pr["title"] == desired_title
                  and pr["body"] == desired_body
                  and pr["base"]["ref"] == "main"
              )
              action = "current" if is_current else "edit"
              print(action, pr["number"])
          PY
          )"; then
            echo "Failed to parse open synchronization PRs." >&2
            exit 1
          fi
          read -r pr_action pr_number <<< "${PR_DECISION}"

          if [[ "${pr_action}" == multiple ]]; then
            echo "More than one open synchronization PR exists." >&2
            exit 1
          elif [[ "${pr_action}" == create ]]; then
            gh pr create \
              --base main \
              --head "${branch}" \
              --title "${desired_title}" \
              --body-file "${RUNNER_TEMP}/a-stock-data-sync-summary.md"
          elif [[ "${pr_action}" == edit ]]; then
            gh pr edit "${pr_number}" \
              --base main \
              --title "${desired_title}" \
              --body-file "${RUNNER_TEMP}/a-stock-data-sync-summary.md"
          elif [[ "${pr_action}" == current ]]; then
            echo "The existing synchronization PR already proposes this upstream content."
          else
            echo "Unexpected synchronization PR decision." >&2
            exit 1
          fi
